<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ шаурмы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #fffaf0;
        }
        h1 { color: #d32f2f; text-align: center; }
        form {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        label { display: block; margin: 12px 0 6px; font-weight: bold; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            background: #d32f2f;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        button:hover { background: #b71c1c; }
    </style>
</head>
<body>
    <h1>🍖 Заказ шаурмы</h1>
    <form>
        <label>Имя:</label>
        <input type="text" required placeholder="Иван Иванов">
        
        <label>Телефон:</label>
        <input type="tel" required placeholder="+7 (___) ___-__-__">
        
        <label>Адрес доставки:</label>
        <input type="text" required placeholder="Улица, дом, квартира">
        
        <label>Тип шаурмы:</label>
        <select required>
            <option value="">Выберите</option>
            <option>Куриная классическая</option>
            <option>Говяжья</option>
            <option>Свиная</option>
            <option>Острая</option>
            <option>Вегетарианская</option>
        </select>
        
        <label>Размер:</label>
        <select required>
            <option value="">Выберите</option>
            <option>Стандарт (250г)</option>
            <option>Большой (400г)</option>
            <option>Мега (600г)</option>
        </select>
        
        <label>Дополнительно:</label>
        <textarea rows="3" placeholder="Больше соуса, без лука, добавить сыр..."></textarea>
        
        <label>Количество:</label>
        <input type="number" value="1" min="1" required>
        
        <button type="submit">🛵 Оформить заказ</button>
    </form>
</body>
</html>
