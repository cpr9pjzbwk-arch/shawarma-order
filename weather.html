<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="weather-styles.css">
</head>
<body>
    <div class="container">
        <div class="weather-wrapper">
            <!-- Header -->
            <header class="header">
                <h1>🌤️ Weather Dashboard</h1>
                <p class="subtitle">Real-time weather information</p>
            </header>

            <!-- Search Section -->
            <div class="search-section">
                <input 
                    type="text" 
                    id="cityInput" 
                    class="city-input" 
                    placeholder="Enter city name..."
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">Search</button>
                <button id="locationBtn" class="location-btn" title="Get current location">📍</button>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Loading weather data...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="error-state hidden"></div>

            <!-- Current Weather -->
            <div id="currentWeather" class="current-weather hidden">
                <div class="location-info">
                    <h2 id="cityName"></h2>
                    <p id="updateTime"></p>
                </div>
                <div class="weather-main">
                    <div class="temp-section">
                        <span id="temperature" class="temperature"></span>
                        <img id="weatherIcon" class="weather-icon" alt="Weather icon">
                    </div>
                    <div class="weather-desc">
                        <p id="weatherDescription"></p>
                        <p id="feelsLike"></p>
                    </div>
                </div>
                <div class="weather-details">
                    <div class="detail-item">
                        <span class="detail-label">Humidity</span>
                        <span class="detail-value" id="humidity"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Wind Speed</span>
                        <span class="detail-value" id="windSpeed"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Pressure</span>
                        <span class="detail-value" id="pressure"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">UV Index</span>
                        <span class="detail-value" id="uvIndex"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Visibility</span>
                        <span class="detail-value" id="visibility"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Dew Point</span>
                        <span class="detail-value" id="dewPoint"></span>
                    </div>
                </div>
            </div>

            <!-- 5-Day Forecast -->
            <div id="forecastSection" class="forecast-section hidden">
                <h3>5-Day Forecast</h3>
                <div id="forecastList" class="forecast-list"></div>
            </div>

            <!-- Recent Searches -->
            <div id="recentSearches" class="recent-searches hidden">
                <h3>Recent Searches</h3>
                <div id="recentList" class="recent-list"></div>
            </div>

            <!-- Temperature Toggle -->
            <div class="temperature-toggle">
                <label class="toggle-label">
                    <input type="checkbox" id="tempToggle" class="toggle-input">
                    <span class="toggle-text">°C / °F</span>
                </label>
            </div>
        </div>
    </div>

    <script src="weather-script.js"></script>
</body>
</html>
